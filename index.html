<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evoly</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <!-- MobileNet model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest/dist/mobilenet.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sign-up View -->
        <div id="signup-view" class="view">
            <h2>Create Account</h2>
            <form id="signup-form">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Username" required><br>
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" placeholder="Phone" required><br>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Email" required><br>
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Password" required><br>
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <!-- Collections Dashboard View -->
        <div id="dashboard-view" class="view" style="display: none;">
            <h2 id="greeting">Hello, User!</h2>
            <button id="new-collection-btn" class="button">+ New Collection</button>
            <div id="collections-list">
                <!-- Collection buttons will be rendered here -->
            </div>
            <button id="logout-btn">Logout</button>
        </div>

        <!-- Create/Edit Collection Modal/View -->
        <div id="collection-form-view" class="view" style="display: none;">
            <h2 id="collection-form-title">Create Collection</h2>
            <form id="collection-form">
                <input type="hidden" id="collection-id">
                <label for="collection-name">Collection Name:</label>
                <input type="text" id="collection-name" required><br>

                <label for="collection-image">Kickoff Photo (Required):</label>
                <input type="file" id="collection-image" accept="image/*" required><br>
                <img id="collection-image-preview" src="#" alt="Image preview" style="display:none; max-width: 200px; margin-top: 10px;"><br>

                <label for="collection-entry-date">Entry Date (Required):</label>
                <input type="date" id="collection-entry-date" required><br>
                <small id="collection-date-message" class="date-message"></small><br>

                <label for="collection-entry-title">Entry Title (Optional):</label>
                <input type="text" id="collection-entry-title"><br>

                <label for="collection-notes">Notes (Optional):</label>
                <textarea id="collection-notes" rows="4"></textarea><br>

                <label for="collection-tags">Tags (Optional, comma-separated):</label>
                <input type="text" id="collection-tags"><br>
                <div id="suggested-tags-collection" class="tag-suggestions"></div><br>

                <button type="submit">Save Collection</button>
                <button type="button" id="cancel-collection-form-btn" class="button secondary">Cancel</button>
            </form>
        </div>

        <!-- Collection Timeline View -->
        <div id="timeline-view" class="view" style="display: none;">
            <div class="timeline-header">
                <h2 id="timeline-collection-name"></h2>
                <button id="back-to-dashboard-btn" class="button secondary">Back to Dashboard</button>
            </div>
            <div id="entries-list">
                <!-- Entry cards will be rendered here -->
            </div>
            <button id="add-entry-fab" class="fab" title="Add New Entry">+</button>
        </div>

        <!-- Add/Edit Entry Modal/View -->
        <div id="entry-form-view" class="view" style="display: none;">
            <h2 id="entry-form-title">Add Entry</h2>
            <form id="entry-form">
                <input type="hidden" id="entry-collection-id">
                <input type="hidden" id="entry-id">

                <label for="entry-image">Photo (Required):</label>
                <input type="file" id="entry-image" accept="image/*" required><br>
                <img id="entry-image-preview" src="#" alt="Image preview" style="display:none; max-width: 200px; margin-top: 10px;"><br>

                <label for="entry-date">Entry Date (Required):</label>
                <input type="date" id="entry-date" required><br>
                <small id="entry-date-message" class="date-message"></small><br>

                <label for="entry-title">Title (Optional):</label>
                <input type="text" id="entry-title"><br>

                <label for="entry-notes">Notes (Optional):</label>
                <textarea id="entry-notes" rows="4"></textarea><br>

                <label for="entry-tags">Tags (Optional, comma-separated):</label>
                <input type="text" id="entry-tags"><br>
                <div id="suggested-tags-entry" class="tag-suggestions"></div><br>

                <button type="submit">Save Entry</button>
                <button type="button" id="cancel-entry-form-btn" class="button secondary">Cancel</button>
            </form>
        </div>

        <!-- Entry Detail View -->
        <div id="entry-detail-view" class="view" style="display: none;">
            <div class="entry-detail-nav">
                <button id="back-to-timeline-btn" class="button secondary">Back to Timeline</button>
                <div>
                    <button id="prev-entry-btn" class="button">< Prev</button>
                    <button id="next-entry-btn" class="button">Next ></button>
                </div>
            </div>
            <img id="entry-detail-image" src="#" alt="Full entry image">
            <h3 id="entry-detail-title"></h3>
            <p class="entry-meta"><strong>Date:</strong> <span id="entry-detail-date"></span></p>
            <div id="entry-detail-tags" class="tag-chips">
                <!-- Tag chips here -->
            </div>
            <div id="entry-detail-notes"></div>
        </div>

        <!-- Alert/Notification Area -->
        <div id="alert-container"></div>
    </div>

    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/exif.js"></script>
    <script src="js/utils/vision.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/collections.js"></script>
    <script src="js/entries.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
